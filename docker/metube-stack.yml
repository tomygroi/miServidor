version: '3.8'

services:
  metube:
    image: alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Mapeamos la carpeta de descargas directamente a tu directorio de Nextcloud
      # para que los archivos impacten de una y el script los detecte
      - /mnt/nextcloud_1tb/data/TU_USUARIO_NEXTCLOUD/files/Downloads:/downloads
    environment:
      - UID=1000
      - GID=1000
      - OUTPUT_TEMPLATE=%(title)s.%(ext)s
      # Opciones recomendadas para rendimiento óptimo en servidores hogareños
      - YTDL_OPTIONS={"format":"bestvideo+bestaudio/best","merge_output_format":"mp4"}